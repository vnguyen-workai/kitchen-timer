<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Time / Temp Control Log</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #16161c; color: #fff;
    -webkit-user-select: none; user-select: none;
  }

  /* ---------- header (centered masthead) ---------- */
  header {
    position: relative;
    text-align: center;
    padding: 14px 16px 14px;
    background: #20202a;
    border-bottom: 1px solid #2e2e3a;
  }
  .rest-name {
    display: block; width: 100%; max-width: 520px; margin: 0 auto;
    font-size: 24px; font-weight: 800; text-align: center; letter-spacing: .3px;
    background: transparent; color: #fff;
    border: none; border-radius: 10px; padding: 3px 8px;
  }
  .rest-name::placeholder { color: #565664; font-weight: 700; }
  .rest-name:focus { outline: none; background: #16161c; box-shadow: 0 0 0 2px #f5a623; }
  .subtitle {
    margin-top: 4px;
    font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: #f5a623;
  }
  .meta-row {
    margin-top: 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    text-align: left;
  }
  .rule { font-size: 13px; font-style: italic; color: #9a9aa8; line-height: 1.45; }
  .add-btn {
    flex-shrink: 0;
    background: #f5a623; color: #16161c;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 800;
    padding: 11px 16px; cursor: pointer;
  }
  .add-btn:active { transform: scale(.96); }

  /* ---------- timer cards ---------- */
  #timers {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px; padding: 18px;
    max-width: 1100px; margin: 0 auto;
  }
  .card {
    background: #262630; border-radius: 20px;
    padding: 22px 20px; text-align: center;
    border: 2px solid #30303c;
    box-shadow: 0 6px 18px rgba(0,0,0,.28);
  }
  .card .name { font-size: 26px; font-weight: 700; margin-bottom: 6px; word-break: break-word; }
  .card .time {
    font-size: 58px; font-weight: 800;
    font-variant-numeric: tabular-nums; line-height: 1.1;
    margin: 4px 0 6px;
  }
  .card .clock {
    font-size: 16px; font-weight: 600; color: #aeaebc;
    margin-bottom: 12px;
  }
  .card .clock b { color: #ff9b3d; }
  .card .temp {
    font-size: 22px; font-weight: 700; color: #ff9b3d;
    margin-bottom: 18px;
  }
  .card .temp.none { color: #62626f; font-weight: 600; font-size: 16px; margin-bottom: 18px; }
  .card.ringing { border-color: #ff4d4d; animation: flash .7s infinite; }
  @keyframes flash { 0%,100% { background: #262630; } 50% { background: #6b1414; } }
  .card.done { opacity: .65; }

  .row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn { border: none; border-radius: 12px; font-size: 19px; font-weight: 700; padding: 14px 18px; cursor: pointer; flex: 1; min-width: 90px; color: #fff; }
  .btn:active { transform: scale(.96); }
  .btn.green { background: #2ecc71; color: #06301a; }
  .btn.gray  { background: #43434f; }
  .btn.red   { background: #ff4d4d; }
  .btn.stop  { background: #ff4d4d; font-size: 28px; padding: 20px; }

  .empty { text-align: center; color: #7a7a86; padding: 60px 20px; font-size: 19px; }

  /* ---------- modal ---------- */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: none; align-items: center; justify-content: center; z-index: 10; padding: 16px; }
  .overlay.show { display: flex; }
  .modal { background: #262630; border-radius: 22px; padding: 26px; width: 100%; max-width: 420px; max-height: 92vh; overflow-y: auto; }
  .modal h2 { margin: 0 0 6px; font-size: 24px; text-align: center; }
  .modal .fixed-note { text-align: center; color: #9a9aa8; font-size: 16px; margin: 0 0 20px; }
  .modal .fixed-note b { color: #2ecc71; }
  .modal label { font-size: 17px; color: #bbb; display: block; margin-bottom: 8px; }
  .modal input[type=text], .modal input[type=number] {
    width: 100%; font-size: 24px; padding: 14px; border-radius: 12px; border: none;
    margin-bottom: 18px; background: #16161c; color: #fff;
  }
  .modal .actions { display: flex; gap: 12px; margin-top: 6px; }

  @media (max-width: 600px) {
    .rest-name { font-size: 22px; }
    .add-btn { font-size: 15px; padding: 10px 14px; }
    .rule { font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <input class="rest-name" id="restName" type="text" placeholder="Restaurant name" autocomplete="off">
  <div class="subtitle">Time / Temp Control Log</div>
  <div class="meta-row">
    <div class="rules">
      <div class="rule">Temp not to exceed 70&deg;F</div>
      <div class="rule">Discard after 4 hours</div>
    </div>
    <button class="add-btn" onclick="openAdd()">+ Add Food</button>
  </div>
</header>

<div id="timers"></div>
<div class="empty" id="empty">No timers yet.<br>Tap <b>+ Add Food</b> to start one.</div>

<!-- Add Food modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Add Food</h2>
    <p class="fixed-note">Timer is fixed at <b>4 hours</b></p>
    <label>Food name</label>
    <input type="text" id="foodName" placeholder="e.g. Meat, Veggie, Crab" autocomplete="off">

    <label>Hold temp °F <small style="color:#888">(optional)</small></label>
    <input type="number" id="foodTemp" inputmode="numeric" placeholder="e.g. 165">

    <div class="actions">
      <button class="btn gray" onclick="closeAdd()">Cancel</button>
      <button class="btn green" onclick="startTimer()">Start 4h Timer</button>
    </div>
  </div>
</div>

<script>
/* ---------- state ---------- */
let timers = [];   // {id,name,total,remaining,state:'running'|'ringing'|'done',startAt,endAt,temp}
const FOUR_HOURS = 4 * 3600;   // seconds — every timer is fixed at 4 hours

const $ = id => document.getElementById(id);
const STORE = 'kitchenTimersV4';
const NAME_STORE = 'kitchenRestName';
const timeEls = new Map();   // id -> .time element (so countdown updates don't rebuild buttons)

/* ---------- persistence ---------- */
function save() { try { localStorage.setItem(STORE, JSON.stringify(timers)); } catch (e) {} }
function load() {
  try {
    const data = JSON.parse(localStorage.getItem(STORE) || '[]');
    const now = Date.now();
    data.forEach(t => {
      if (t.state === 'running' && t.endAt) {
        t.remaining = Math.max(0, Math.round((t.endAt - now) / 1000));
        if (t.remaining === 0) t.state = 'ringing';
      }
    });
    timers = data;
  } catch (e) { timers = []; }
}

/* ---------- restaurant name ---------- */
function loadName() { try { $('restName').value = localStorage.getItem(NAME_STORE) || ''; } catch (e) {} }
function saveName() { try { localStorage.setItem(NAME_STORE, $('restName').value); } catch (e) {} }

/* ---------- add modal ---------- */
function openAdd() {
  $('foodName').value = ''; $('foodTemp').value = '';
  $('overlay').classList.add('show'); unlockAudio();
  setTimeout(() => $('foodName').focus(), 50);
}
function closeAdd() { $('overlay').classList.remove('show'); }
function startTimer() {
  const name = $('foodName').value.trim() || 'Food';
  const total = FOUR_HOURS;
  const tempRaw = $('foodTemp').value.trim();
  const temp = tempRaw === '' ? null : Number(tempRaw);
  const now = Date.now();
  timers.push({
    id: uid(), name, total, remaining: total, state: 'running',
    startAt: now, endAt: now + total * 1000,
    temp: (temp != null && !isNaN(temp)) ? temp : null
  });
  save(); render(); closeAdd();
}

/* ---------- controls (no pause) ---------- */
function restart(id) {
  const t = timers.find(x => x.id === id); if (!t) return;
  const now = Date.now();
  t.remaining = t.total; t.startAt = now; t.endAt = now + t.total * 1000; t.state = 'running';
  save(); render();
}
function stopRing(id) { const t = timers.find(x => x.id === id); if (!t) return; t.state = 'done'; t.remaining = 0; save(); render(); }
function del(id) { timers = timers.filter(x => x.id !== id); save(); render(); }

/* ---------- formatting ---------- */
function fmt(s) {
  s = Math.max(0, s);
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  const p = n => String(n).padStart(2, '0');
  return h > 0 ? `${h}:${p(m)}:${p(sec)}` : `${m}:${p(sec)}`;
}
function clock(ms) {
  const d = new Date(ms);
  let h = d.getHours(); const m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${String(m).padStart(2, '0')} ${ap}`;
}

/* ---------- render (full rebuild on changes only) ---------- */
function render() {
  const wrap = $('timers'); timeEls.clear();
  $('empty').style.display = timers.length ? 'none' : 'block';
  wrap.innerHTML = '';
  timers.forEach(t => {
    const card = document.createElement('div');
    card.className = 'card' + (t.state === 'ringing' ? ' ringing' : '') + (t.state === 'done' ? ' done' : '');
    let controls;
    if (t.state === 'ringing') controls = `<button class="btn stop" onclick="stopRing('${t.id}')">STOP</button>`;
    else if (t.state === 'done') controls = `<div class="row"><button class="btn green" onclick="restart('${t.id}')">Start Again</button><button class="btn gray" onclick="del('${t.id}')">Delete</button></div>`;
    else controls = `<div class="row"><button class="btn gray" onclick="restart('${t.id}')">Reset</button><button class="btn red" onclick="del('${t.id}')">Delete</button></div>`;
    const label = t.state === 'ringing' ? 'DONE!' : (t.state === 'done' ? 'Done' : fmt(t.remaining));
    const clockLine = `<div class="clock">Start ${clock(t.startAt)} · <b>End ${clock(t.endAt)}</b></div>`;
    const tempLine = (t.temp != null)
      ? `<div class="temp">🌡️ ${t.temp}°F</div>`
      : `<div class="temp none">no temp set</div>`;
    card.innerHTML = `<div class="name">${esc(t.name)}</div><div class="time">${label}</div>${clockLine}${tempLine}${controls}`;
    wrap.appendChild(card);
    timeEls.set(t.id, card.querySelector('.time'));
  });
}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function uid() { return Date.now().toString(36) + '-' + Math.floor(performance.now()).toString(36) + '-' + (uid._n = (uid._n || 0) + 1); }

/* ---------- tick (updates numbers only, never rebuilds buttons mid-countdown) ---------- */
setInterval(() => {
  const now = Date.now();
  timers.forEach(t => {
    if (t.state === 'running') {
      const rem = Math.max(0, Math.round((t.endAt - now) / 1000));
      if (rem !== t.remaining) { t.remaining = rem; const el = timeEls.get(t.id); if (el) el.textContent = fmt(rem); }
      if (rem === 0) { t.state = 'ringing'; save(); render(); }
    }
  });
  timers.some(t => t.state === 'ringing') ? startAlarm() : stopAlarm();
}, 250);

/* ---------- alarm (loops until stopped) ---------- */
let audioCtx = null, alarmTimer = null;
function unlockAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep() {
  if (!audioCtx) { unlockAudio(); }
  if (!audioCtx) return;
  const resume = audioCtx.state === 'suspended' ? audioCtx.resume() : Promise.resolve();
  resume.then(function () {
    try {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'square'; o.frequency.value = 880; g.gain.value = 0.4;
      o.connect(g); g.connect(audioCtx.destination);
      const n = audioCtx.currentTime;
      g.gain.setValueAtTime(0.4, n); g.gain.setValueAtTime(0.0001, n + 0.3);
      o.start(n); o.stop(n + 0.35);
    } catch (e) {}
  });
}
function startAlarm() { unlockAudio(); if (alarmTimer) return; beep(); alarmTimer = setInterval(beep, 700); }
function stopAlarm() { if (alarmTimer) { clearInterval(alarmTimer); alarmTimer = null; } }

document.body.addEventListener('touchstart', unlockAudio);
document.body.addEventListener('click', unlockAudio);
$('restName').addEventListener('input', saveName);
$('foodName').addEventListener('keydown', e => { if (e.key === 'Enter') startTimer(); });
$('foodTemp').addEventListener('keydown', e => { if (e.key === 'Enter') startTimer(); });

/* ---------- boot ---------- */
loadName(); load(); render();
if (timers.some(t => t.state === 'ringing')) startAlarm();
</script>
</body>
</html>
